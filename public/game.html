<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox Helper TD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #06080d; color: #fff;
            font-family: Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }
        .wrapper { width: min(1500px, 95vw); position: relative; }
        h1 { text-align: center; color: #6bdcff; margin-bottom: 10px; letter-spacing: 2px; }
        .description { text-align: center; color: #c8d5df; margin-bottom: 20px; line-height: 1.6; }
        .topPanel {
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
            flex-wrap: wrap; background: #111827; border: 1px solid #2d4b63;
            border-radius: 12px; padding: 15px; margin-bottom: 15px;
        }
        .stats { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat { color: #7fe8ff; font-weight: bold; }
        .buttons { display: flex; gap: 10px; }
        button {
            padding: 12px 20px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: bold; transition: .2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .start { background: #27c06d; color: white; }
        .restart { background: #2e7cff; color: white; }
        .canvasBox {
            width: 100%; aspect-ratio: 16/9; border: 2px solid #2f89ff;
            border-radius: 14px; overflow: hidden; background: #0a1018;
            box-shadow: 0 0 25px rgba(0,160,255,.25); position: relative;
        }
        canvas { width: 100%; height: 100%; display: block; }
        .message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85); color: #ff5e5e; padding: 12px 28px;
            border-radius: 30px; font-weight: bold; font-size: 1.2rem;
            pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 10;
        }
        .message.show { opacity: 1; }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>Xbox Helper Tower Defense</h1>
    <div class="description">
        Защищайте базу от волн противников.<br>
        Стройте башни вдоль дороги и не дайте врагам пройти.
    </div>
    <div class="topPanel">
        <div class="stats">
            <div class="stat">❤️ Жизни: <span id="lives">20</span></div>
            <div class="stat">🪙 Монеты: <span id="coins">200</span></div>
            <div class="stat">🌊 Волна: <span id="wave">1</span></div>
        </div>
        <div class="buttons">
            <button class="start" id="startBtn">Запустить волну</button>
            <button class="restart" id="restartBtn">Перезапустить игру</button>
        </div>
    </div>
    <div class="canvasBox" id="canvasBox">
        <canvas id="game"></canvas>
        <div class="message" id="message">Недостаточно монет</div>
    </div>
</div>

<script>
    (function() {
        // ========== DOM элементы ==========
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");
        const livesText = document.getElementById("lives");
        const coinsText = document.getElementById("coins");
        const waveText = document.getElementById("wave");
        const messageEl = document.getElementById("message");

        // ========== Игровые переменные ==========
        let lives = 20;
        let coins = 200;
        let wave = 1;

        /** @type {Array<{x, y, speed, health, maxHealth, reward, targetIndex}>} */
        let enemies = [];
        let waveRunning = false;
        let enemiesToSpawn = 0;
        let spawnTimer = 0;
        const spawnDelay = 45;

        /** @type {Array<{x, y, range, damage, fireRate, cooldown, target: null|Object, angle: number}>} */
        let towers = [];

        /** @type {Array<{x, y, target: Object, speed, damage}>} */
        let bullets = [];

        /** @type {Array<{x, y, vx, vy, life, maxLife, color, size}>} */
        let particles = [];

        // Мышь
        let mouse = { x: 0, y: 0, onCanvas: false };
        let preview = { x: 0, y: 0, valid: false, visible: false };
        let hoveredTower = null;

        // Константы башен
        const TOWER_COST = 50;
        const TOWER_RANGE = 150;
        const TOWER_DAMAGE = 10;
        const TOWER_FIRE_RATE = 30; // кадров между выстрелами
        const MIN_DIST_FROM_ROAD = 40;
        const MIN_DIST_BETWEEN_TOWERS = 55;
        const BULLET_SPEED = 8;

        // ========== Маршрут врагов ==========
        const pathPoints = [
            { x: 0, y: 150 },
            { x: 240, y: 150 },
            { x: 240, y: 320 },
            { x: 650, y: 320 },
            { x: 650, y: 580 },
            { x: 1020, y: 580 },
            { x: 1020, y: 250 },
            { x: 1400, y: 250 },
            { x: 1400, y: 720 },
            { x: 1600, y: 720 }
        ];

        // ========== Настройка canvas ==========
        function resizeCanvas() {
            canvas.width = 1600;
            canvas.height = 900;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== Вспомогательные функции ==========
        function updateUI() {
            livesText.textContent = lives;
            coinsText.textContent = coins;
            waveText.textContent = wave;
        }

        let messageTimeout;
        function showMessage(text) {
            messageEl.textContent = text;
            messageEl.classList.add("show");
            clearTimeout(messageTimeout);
            messageTimeout = setTimeout(() => messageEl.classList.remove("show"), 1200);
        }

        // Расстояние от точки до отрезка
        function distanceToSegment(px, py, x1, y1, x2, y2) {
            const dx = x2 - x1;
            const dy = y2 - y1;
            const lengthSq = dx * dx + dy * dy;
            if (lengthSq === 0) return Math.hypot(px - x1, py - y1);
            let t = ((px - x1) * dx + (py - y1) * dy) / lengthSq;
            t = Math.max(0, Math.min(1, t));
            const nearX = x1 + t * dx;
            const nearY = y1 + t * dy;
            return Math.hypot(px - nearX, py - nearY);
        }

        function isPlacementValid(x, y) {
            // Проверка расстояния до дороги
            for (let i = 0; i < pathPoints.length - 1; i++) {
                const dist = distanceToSegment(x, y, pathPoints[i].x, pathPoints[i].y, pathPoints[i+1].x, pathPoints[i+1].y);
                if (dist < MIN_DIST_FROM_ROAD) return false;
            }
            // Проверка расстояния до других башен
            for (const tower of towers) {
                if (Math.hypot(x - tower.x, y - tower.y) < MIN_DIST_BETWEEN_TOWERS) return false;
            }
            // Проверка границ
            if (x < 20 || x > canvas.width - 20 || y < 20 || y > canvas.height - 20) return false;
            return true;
        }

        function placeTower(x, y) {
            if (coins < TOWER_COST) {
                showMessage("Недостаточно монет");
                return;
            }
            if (!isPlacementValid(x, y)) return;

            towers.push({
                x, y,
                range: TOWER_RANGE,
                damage: TOWER_DAMAGE,
                fireRate: TOWER_FIRE_RATE,
                cooldown: 0,
                target: null,
                angle: -Math.PI / 2 // по умолчанию вверх
            });
            coins -= TOWER_COST;
            updateUI();
        }

        // Получение координат мыши относительно canvas
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        // ========== Обработчики мыши ==========
        canvas.addEventListener('mousemove', (e) => {
            const coords = getCanvasCoords(e);
            mouse.x = coords.x;
            mouse.y = coords.y;
            mouse.onCanvas = true;

            preview.x = coords.x;
            preview.y = coords.y;
            preview.valid = isPlacementValid(coords.x, coords.y);
            preview.visible = true;

            hoveredTower = null;
            for (const tower of towers) {
                if (Math.hypot(coords.x - tower.x, coords.y - tower.y) < 20) {
                    hoveredTower = tower;
                    break;
                }
            }
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.onCanvas = false;
            preview.visible = false;
            hoveredTower = null;
        });

        canvas.addEventListener('click', (e) => {
            if (!mouse.onCanvas || hoveredTower) return;
            placeTower(mouse.x, mouse.y);
        });

        // ========== Запуск волны ==========
        function startWave() {
            if (waveRunning) return;
            waveRunning = true;
            startBtn.disabled = true;

            const count = 3 + wave * 2;
            enemiesToSpawn = count;
            spawnTimer = 20;
        }

        function restartGame() {
            lives = 20;
            coins = 200;
            wave = 1;
            enemies = [];
            towers = [];
            bullets = [];
            particles = [];
            waveRunning = false;
            enemiesToSpawn = 0;
            spawnTimer = 0;
            startBtn.disabled = false;
            hoveredTower = null;
            updateUI();
        }

        function spawnEnemy() {
            const baseSpeed = 2.0;
            const baseHealth = 20;
            const baseReward = 10;
            const speed = baseSpeed + wave * 0.3;
            const health = baseHealth + wave * 10;
            const reward = baseReward + wave * 5;

            enemies.push({
                x: pathPoints[0].x,
                y: pathPoints[0].y,
                speed,
                health,
                maxHealth: health,
                reward,
                targetIndex: 1
            });
        }

        // Создание частиц
        function addParticles(x, y, count, color, spread = 2) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * spread;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 15 + Math.random() * 10,
                    maxLife: 25,
                    color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        // ========== Обновление игровой логики ==========
        function update() {
            // --- Обновление волны и врагов ---
            if (waveRunning) {
                if (enemiesToSpawn > 0) {
                    spawnTimer--;
                    if (spawnTimer <= 0) {
                        spawnEnemy();
                        enemiesToSpawn--;
                        spawnTimer = spawnDelay;
                    }
                }

                // Движение врагов
                for (let i = 0; i < enemies.length; i++) {
                    const enemy = enemies[i];
                    if (enemy.health <= 0) continue;

                    const target = pathPoints[enemy.targetIndex];
                    const dx = target.x - enemy.x;
                    const dy = target.y - enemy.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < enemy.speed) {
                        enemy.x = target.x;
                        enemy.y = target.y;
                        enemy.targetIndex++;

                        if (enemy.targetIndex >= pathPoints.length) {
                            lives--;
                            enemy.health = 0;
                            updateUI();
                            if (lives <= 0) {
                                waveRunning = false;
                                startBtn.disabled = false;
                                enemiesToSpawn = 0;
                                alert('Игра окончена!');
                            }
                        }
                    } else {
                        const dirX = dx / distance;
                        const dirY = dy / distance;
                        enemy.x += dirX * enemy.speed;
                        enemy.y += dirY * enemy.speed;
                    }
                }

                // Удаление мёртвых врагов (с конца)
                for (let i = enemies.length - 1; i >= 0; i--) {
                    if (enemies[i].health <= 0) {
                        enemies.splice(i, 1);
                    }
                }

                // Проверка завершения волны
                if (enemiesToSpawn === 0 && enemies.length === 0) {
                    waveRunning = false;
                    startBtn.disabled = false;
                    coins += 50 + wave * 10;
                    wave++;
                    updateUI();
                }
            }

            // --- Логика башен ---
            for (const tower of towers) {
                // Уменьшаем кулдаун
                if (tower.cooldown > 0) {
                    tower.cooldown--;
                }

                // Выбор цели
                let targetEnemy = null;
                let maxProgress = -1;

                for (const enemy of enemies) {
                    if (enemy.health <= 0) continue;
                    const dist = Math.hypot(tower.x - enemy.x, tower.y - enemy.y);
                    if (dist <= tower.range) {
                        // Приоритет: враг, который дальше прошёл (больше targetIndex)
                        if (enemy.targetIndex > maxProgress) {
                            maxProgress = enemy.targetIndex;
                            targetEnemy = enemy;
                        } else if (enemy.targetIndex === maxProgress && targetEnemy) {
                            // Дополнительно: ближайший к башне при одинаковом прогрессе
                            const distCurrent = Math.hypot(tower.x - enemy.x, tower.y - enemy.y);
                            const distPrev = Math.hypot(tower.x - targetEnemy.x, tower.y - targetEnemy.y);
                            if (distCurrent < distPrev) {
                                targetEnemy = enemy;
                            }
                        }
                    }
                }

                tower.target = targetEnemy;

                // Поворот к цели
                if (targetEnemy) {
                    tower.angle = Math.atan2(targetEnemy.y - tower.y, targetEnemy.x - tower.x);
                }

                // Стрельба
                if (targetEnemy && tower.cooldown <= 0) {
                    bullets.push({
                        x: tower.x,
                        y: tower.y,
                        target: targetEnemy,
                        speed: BULLET_SPEED,
                        damage: tower.damage
                    });
                    tower.cooldown = tower.fireRate;
                }
            }

            // --- Обновление снарядов ---
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                const target = bullet.target;

                // Если цель мертва или удалена, удаляем снаряд
                if (!target || target.health <= 0) {
                    bullets.splice(i, 1);
                    continue;
                }

                // Наводимся на цель
                const dx = target.x - bullet.x;
                const dy = target.y - bullet.y;
                const distToTarget = Math.sqrt(dx * dx + dy * dy);

                if (distToTarget < 12) { // Попадание
                    target.health -= bullet.damage;
                    addParticles(target.x, target.y, 5, '#ff9f43', 3);
                    bullets.splice(i, 1);

                    // Если враг убит
                    if (target.health <= 0) {
                        coins += target.reward;
                        updateUI();
                        addParticles(target.x, target.y, 12, '#e74c3c', 4);
                    }
                } else {
                    // Движение в сторону цели
                    const dirX = dx / distToTarget;
                    const dirY = dy / distToTarget;
                    bullet.x += dirX * bullet.speed;
                    bullet.y += dirY * bullet.speed;
                }
            }

            // --- Обновление частиц ---
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // ========== Отрисовка ==========
        function drawGrid() {
            ctx.strokeStyle = "#162334";
            ctx.lineWidth = 1;
            const size = 50;
            for (let x = 0; x <= canvas.width; x += size) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += size) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        function drawRoad() {
            ctx.strokeStyle = "#808080";
            ctx.lineWidth = 60;
            ctx.lineJoin = "round";
            ctx.lineCap = "round";
            ctx.beginPath();
            ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
            for (let i = 1; i < pathPoints.length; i++) {
                ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
            }
            ctx.stroke();

            ctx.strokeStyle = "#bfc7d5";
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
            for (let i = 1; i < pathPoints.length; i++) {
                ctx.lineTo(pathPoints[i].x, pathPoints[i].y);
            }
            ctx.stroke();
        }

        function drawTowers() {
            for (const tower of towers) {
                // Основание
                ctx.fillStyle = "#4b5563";
                ctx.beginPath();
                ctx.arc(tower.x, tower.y, 16, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "#9ca3af";
                ctx.lineWidth = 2;
                ctx.stroke();

                // Ствол, повернутый в сторону цели (или вверх по умолчанию)
                ctx.save();
                ctx.translate(tower.x, tower.y);
                ctx.rotate(tower.angle);
                ctx.fillStyle = "#d1d5db";
                ctx.beginPath();
                ctx.arc(12, 0, 5, 0, Math.PI * 2); // ствол на расстоянии 12 от центра
                ctx.fill();
                ctx.strokeStyle = "#4b5563";
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Линия ствола
                ctx.strokeStyle = "#9ca3af";
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(12, 0);
                ctx.stroke();
                ctx.restore();

                // Радиус при наведении
                if (hoveredTower === tower) {
                    ctx.strokeStyle = "rgba(46, 204, 113, 0.7)";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(tower.x, tower.y, tower.range, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.fillStyle = "rgba(46, 204, 113, 0.08)";
                    ctx.fill();
                }
            }
        }

        function drawPreview() {
            if (!preview.visible || !mouse.onCanvas) return;
            const radius = 16;
            const color = preview.valid ? "#2ecc71" : "#e74c3c";
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(preview.x, preview.y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = preview.valid ? "rgba(46, 204, 113, 0.3)" : "rgba(231, 76, 60, 0.3)";
            ctx.fill();

            ctx.strokeStyle = preview.valid ? "rgba(46, 204, 113, 0.4)" : "rgba(231, 76, 60, 0.4)";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(preview.x, preview.y, TOWER_RANGE, 0, Math.PI * 2);
            ctx.stroke();
        }

        function drawBullets() {
            for (const bullet of bullets) {
                ctx.fillStyle = "#ffe66d";
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawParticles() {
            for (const p of particles) {
                const alpha = p.life / p.maxLife;
                ctx.fillStyle = p.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                if (p.color.startsWith('#')) {
                    // Преобразуем hex в rgba
                    ctx.fillStyle = `rgba(${parseInt(p.color.slice(1,3),16)}, ${parseInt(p.color.slice(3,5),16)}, ${parseInt(p.color.slice(5,7),16)}, ${alpha})`;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawEnemies() {
            for (const enemy of enemies) {
                if (enemy.health <= 0) continue;
                ctx.fillStyle = "#e63946";
                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, 14, 0, Math.PI * 2);
                ctx.fill();

                const barWidth = 30;
                const barHeight = 5;
                const barX = enemy.x - barWidth / 2;
                const barY = enemy.y - 24;

                ctx.fillStyle = "#333";
                ctx.fillRect(barX, barY, barWidth, barHeight);
                const healthPercent = enemy.health / enemy.maxHealth;
                ctx.fillStyle = "#2ecc71";
                ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawGrid();
            drawRoad();
            drawTowers();
            drawPreview();
            drawBullets();
            drawParticles();
            drawEnemies();
            requestAnimationFrame(draw);
        }

        // ========== Игровой цикл ==========
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        startBtn.addEventListener('click', startWave);
        restartBtn.addEventListener('click', restartGame);

        updateUI();
        gameLoop();
    })();
</script>
</body>
</html>
