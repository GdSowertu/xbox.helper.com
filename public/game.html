<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Охота за монетами</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1e 0%, #0c1222 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
            padding: 20px;
        }

        /* Игровая карточка */
        .game-container {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            padding: 24px 28px 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.2);
            transition: all 0.2s;
        }

        /* Заголовок */
        .game-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFE6A3, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 18px;
            word-break: keep-all;
        }

        /* Поле canvas */
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.6), inset 0 0 0 2px rgba(255,215,0,0.2);
            cursor: none;
            background: #101624;
        }

        /* Панель с информацией */
        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-top: 20px;
            gap: 25px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 24px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 200, 50, 0.3);
        }

        .stat-card {
            background: #0f1422;
            padding: 6px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.4), 0 4px 10px rgba(0,0,0,0.2);
        }

        .stat-label {
            font-weight: 600;
            font-size: 1.1rem;
            color: #b9c7d9;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-weight: 800;
            font-size: 1.8rem;
            color: #FFD966;
            text-shadow: 0 0 5px #ffae00;
            line-height: 1;
            font-family: monospace;
        }

        .restart-btn {
            background: linear-gradient(95deg, #2a2f45, #1a1f33);
            border: none;
            padding: 10px 28px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #FFE3A4;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 0 #0b0e17;
            font-family: inherit;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(95deg, #3c4370, #272e4a);
            box-shadow: 0 7px 0 #0b0e17;
            color: #FFEFB9;
        }

        .restart-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0b0e17;
        }

        .message-area {
            background: #0a0e1a;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #ffbc6e;
            text-align: center;
            flex: 1;
            white-space: nowrap;
        }

        @media (max-width: 950px) {
            .game-container { padding: 16px 20px 24px; }
            canvas { width: 100%; height: auto; }
            .stat-value { font-size: 1.5rem; }
            .stat-label { font-size: 0.9rem; }
            .restart-btn { padding: 6px 18px; font-size: 0.9rem; }
            .message-area { font-size: 0.8rem; white-space: normal; text-align: center; }
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="game-title">✨ Охота за монетами ✨</div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <div class="stats-panel">
        <div class="stat-card">
            <span class="stat-label">💰 Счёт</span>
            <span class="stat-value" id="scoreValue">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">⏱️ Время</span>
            <span class="stat-value" id="timeValue">30</span>
        </div>
        <div class="message-area" id="gameMessage">
            🎮 Собирай золотые монеты!
        </div>
        <button class="restart-btn" id="restartButton">🔄 Начать заново</button>
    </div>
</div>

<script>
    (function() {
        // ---------- Элементы ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Размеры игрового поля
        const WIDTH = 800;
        const HEIGHT = 500;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        // Параметры игрока (квадрат)
        const PLAYER_SIZE = 32;          // сторона квадрата (пикселей)
        let playerX = (WIDTH / 2) - (PLAYER_SIZE / 2);
        let playerY = (HEIGHT / 2) - (PLAYER_SIZE / 2);
        
        // Скорость перемещения (пикселей за кадр)
        const PLAYER_SPEED = 4.5;
        
        // Параметры монеты (золотой круг)
        const COIN_RADIUS = 14;           // радиус монеты
        let coinX = 0;
        let coinY = 0;
        
        // Игровые переменные
        let score = 0;
        let timeLeft = 30;                // 30 секунд
        let active = true;                // активна ли игра (не закончена)
        let timerInterval = null;         // интервал таймера
        
        // Флаги нажатых клавиш (для плавного управления)
        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, s: false, a: false, d: false
        };
        
        // DOM элементы интерфейса
        const scoreSpan = document.getElementById('scoreValue');
        const timeSpan = document.getElementById('timeValue');
        const messageDiv = document.getElementById('gameMessage');
        const restartBtn = document.getElementById('restartButton');
        
        // ---------- Вспомогательные функции ----------
        
        // Обновить отображение счета
        function updateScoreUI() {
            scoreSpan.textContent = score;
        }
        
        // Обновить отображение времени
        function updateTimeUI() {
            timeSpan.textContent = timeLeft;
        }
        
        // Генерация случайной позиции для монеты (с учётом границ и не на игроке)
        function getRandomCoinPosition() {
            // границы, чтобы монета полностью помещалась (не вылезала за края)
            const minX = COIN_RADIUS;
            const maxX = WIDTH - COIN_RADIUS;
            const minY = COIN_RADIUS;
            const maxY = HEIGHT - COIN_RADIUS;
            
            let safe = false;
            let attempts = 0;
            let randX, randY;
            const MAX_ATTEMPTS = 50;
            
            while (!safe && attempts < MAX_ATTEMPTS) {
                randX = minX + Math.random() * (maxX - minX);
                randY = minY + Math.random() * (maxY - minY);
                
                // Вычисляем центр игрока (квадрат)
                const playerCenterX = playerX + PLAYER_SIZE / 2;
                const playerCenterY = playerY + PLAYER_SIZE / 2;
                // Расстояние между центром монеты и центром игрока
                const dx = randX - playerCenterX;
                const dy = randY - playerCenterY;
                const dist = Math.hypot(dx, dy);
                // Нужно, чтобы монета не появлялась прямо на игроке (дистанция больше суммы радиусов + небольшой запас)
                const minDist = (PLAYER_SIZE / 2) + COIN_RADIUS + 8;
                if (dist >= minDist) {
                    safe = true;
                }
                attempts++;
            }
            // Если после попыток не получилось, просто ставим в свободную позицию (почти всегда работает)
            return { x: randX, y: randY };
        }
        
        // Создать новую монету (не на игроке)
        function generateNewCoin() {
            const { x, y } = getRandomCoinPosition();
            coinX = x;
            coinY = y;
        }
        
        // Сбор монеты: увеличить счёт, обновить UI, создать новую монету
        function collectCoin() {
            if (!active) return;  // игра окончена – монеты не собираем
            
            score++;
            updateScoreUI();
            generateNewCoin();    // появляется новая монета в случайном месте (не на игроке)
        }
        
        // Проверка столкновения игрока с монетой (по расстоянию между центрами)
        function checkCollision() {
            if (!active) return false;
            
            // Центр игрока (квадрат)
            const playerCenterX = playerX + PLAYER_SIZE / 2;
            const playerCenterY = playerY + PLAYER_SIZE / 2;
            // Расстояние до монеты (круг)
            const dx = playerCenterX - coinX;
            const dy = playerCenterY - coinY;
            const distance = Math.hypot(dx, dy);
            const collisionDist = (PLAYER_SIZE / 2) + COIN_RADIUS;
            
            if (distance < collisionDist) {
                collectCoin();
                return true;
            }
            return false;
        }
        
        // Завершение игры (таймер закончился)
        function endGame() {
            if (!active) return; // уже закончена
            
            active = false;
            // Останавливаем отсчёт времени
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            // Показываем сообщение с результатом
            messageDiv.innerHTML = `⏰ ИГРА ОКОНЧЕНА! Ваш счёт: ${score} монет ⏰`;
        }
        
        // Сброс и перезапуск игры
        function resetGame() {
            // Останавливаем старый таймер, чтобы не накладывался
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            // Сбрасываем игровое состояние
            active = true;
            score = 0;
            timeLeft = 30;
            updateScoreUI();
            updateTimeUI();
            
            // Возвращаем игрока в центр
            playerX = (WIDTH / 2) - (PLAYER_SIZE / 2);
            playerY = (HEIGHT / 2) - (PLAYER_SIZE / 2);
            
            // Генерируем монету (гарантированно не на игроке)
            generateNewCoin();
            
            // Сбрасываем сообщение
            messageDiv.innerHTML = "🎲 Игра началась! Лови монеты! 🎲";
            
            // Запускаем таймер заново
            timerInterval = setInterval(() => {
                if (active && timeLeft > 0) {
                    timeLeft--;
                    updateTimeUI();
                    
                    if (timeLeft <= 0) {
                        // Время вышло
                        endGame();
                    }
                } else if (!active) {
                    // Если игра неактивна, таймер больше не нужен, но очистим позже
                    if (timerInterval) clearInterval(timerInterval);
                }
            }, 1000);
        }
        
        // ---------- Движение игрока (обновление позиции по нажатым клавишам) ----------
        function updatePlayerMovement() {
            if (!active) return; // игра остановлена – персонаж не двигается
            
            let moveX = 0;
            let moveY = 0;
            
            // Стрелки / WASD
            if (keys.ArrowUp || keys.w) moveY -= 1;
            if (keys.ArrowDown || keys.s) moveY += 1;
            if (keys.ArrowLeft || keys.a) moveX -= 1;
            if (keys.ArrowRight || keys.d) moveX += 1;
            
            // Нормализуем диагональное движение (чтобы скорость по диагонали не была выше)
            if (moveX !== 0 || moveY !== 0) {
                const length = Math.hypot(moveX, moveY);
                moveX = moveX / length;
                moveY = moveY / length;
            }
            
            // Применяем скорость
            let newX = playerX + moveX * PLAYER_SPEED;
            let newY = playerY + moveY * PLAYER_SPEED;
            
            // Границы (игрок не должен выходить за пределы поля)
            newX = Math.min(Math.max(newX, 0), WIDTH - PLAYER_SIZE);
            newY = Math.min(Math.max(newY, 0), HEIGHT - PLAYER_SIZE);
            
            playerX = newX;
            playerY = newY;
        }
        
        // ---------- Отрисовка всей игры (canvas) ----------
        function draw() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // 1. Тёмный фон с текстурой сетки (стильно)
            ctx.fillStyle = "#101624";
            ctx.fillRect(0, 0, WIDTH, HEIGHT);
            
            // Лёгкая сетка для стиля
            ctx.strokeStyle = "#2a334f";
            ctx.lineWidth = 0.6;
            for (let i = 0; i < WIDTH; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, HEIGHT);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(WIDTH, i);
                ctx.stroke();
            }
            
            // 2. Игрок - сияющий квадрат с градиентом
            const gradient = ctx.createLinearGradient(playerX, playerY, playerX + PLAYER_SIZE, playerY + PLAYER_SIZE);
            gradient.addColorStop(0, '#3c82f6');
            gradient.addColorStop(1, '#1e4a8a');
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#3b82f6";
            ctx.fillStyle = gradient;
            ctx.fillRect(playerX, playerY, PLAYER_SIZE, PLAYER_SIZE);
            // рамка
            ctx.shadowBlur = 0;
            ctx.strokeStyle = "#FFD966";
            ctx.lineWidth = 2;
            ctx.strokeRect(playerX, playerY, PLAYER_SIZE, PLAYER_SIZE);
            // глаза (для милоты)
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(playerX + PLAYER_SIZE * 0.7, playerY + PLAYER_SIZE * 0.35, 4, 0, Math.PI * 2);
            ctx.arc(playerX + PLAYER_SIZE * 0.3, playerY + PLAYER_SIZE * 0.35, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#0b0f1a";
            ctx.beginPath();
            ctx.arc(playerX + PLAYER_SIZE * 0.7, playerY + PLAYER_SIZE * 0.33, 2, 0, Math.PI * 2);
            ctx.arc(playerX + PLAYER_SIZE * 0.3, playerY + PLAYER_SIZE * 0.33, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // 3. Монета (золотой круг с блеском)
            ctx.shadowBlur = 12;
            ctx.shadowColor = "#ffaa33";
            // внешнее свечение
            ctx.beginPath();
            ctx.arc(coinX, coinY, COIN_RADIUS + 2, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255, 200, 50, 0.3)";
            ctx.fill();
            // основная монета
            const coinGrad = ctx.createRadialGradient(coinX - 3, coinY - 3, 3, coinX, coinY, COIN_RADIUS);
            coinGrad.addColorStop(0, "#FFD966");
            coinGrad.addColorStop(1, "#E6A800");
            ctx.beginPath();
            ctx.arc(coinX, coinY, COIN_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = coinGrad;
            ctx.fill();
            // символ "$" на монете
            ctx.font = `bold ${COIN_RADIUS + 4}px "Segoe UI", monospace`;
            ctx.fillStyle = "#442200";
            ctx.shadowBlur = 2;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("$", coinX, coinY + 1);
            ctx.fillStyle = "#FFEFB0";
            ctx.fillText("$", coinX - 1, coinY);
            ctx.shadowBlur = 0;
            
            // 4. Доп. эффект если игра закончена – затемняем canvas но не сильно
            if (!active) {
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(0, 0, WIDTH, HEIGHT);
                ctx.font = "bold 28px 'Segoe UI'";
                ctx.fillStyle = "#FFD966";
                ctx.shadowBlur = 0;
                ctx.textAlign = "center";
                ctx.fillText("🕹️ ИГРА ЗАВЕРШЕНА", WIDTH/2, HEIGHT/2);
                ctx.font = "18px monospace";
                ctx.fillStyle = "#ffe6b3";
                ctx.fillText(`Ваш результат: ${score} монет`, WIDTH/2, HEIGHT/2 + 45);
            }
            
            // Сброс тени
            ctx.shadowBlur = 0;
        }
        
        // ---------- Основной игровой цикл (обновление логики и перерисовка) ----------
        function gameLoop() {
            // 1. Движение игрока если активна игра
            if (active) {
                updatePlayerMovement();    // обновляем координаты игрока по клавишам
                checkCollision();          // проверяем подобрана ли монета
            }
            
            // 2. Рисуем всё на canvas
            draw();
            
            // 3. Продолжаем анимацию
            requestAnimationFrame(gameLoop);
        }
        
        // ---------- Обработчики клавиш (управление) ----------
        function handleKeyDown(e) {
            const key = e.key;
            // Стрелки и WASD
            if (keys.hasOwnProperty(key)) {
                keys[key] = true;
                e.preventDefault(); // предотвращаем скролл страницы
            }
            // Дополнительно, чтобы не прокручивало
            if (key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight" ||
                key === "w" || key === "s" || key === "a" || key === "d") {
                e.preventDefault();
            }
        }
        
        function handleKeyUp(e) {
            const key = e.key;
            if (keys.hasOwnProperty(key)) {
                keys[key] = false;
                e.preventDefault();
            }
            if (key === "ArrowUp" || key === "ArrowDown" || key === "ArrowLeft" || key === "ArrowRight" ||
                key === "w" || key === "s" || key === "a" || key === "d") {
                e.preventDefault();
            }
        }
        
        // ---------- Инициализация игры (первый запуск) ----------
        function initGame() {
            // Стартовая позиция игрока (центр)
            playerX = (WIDTH / 2) - (PLAYER_SIZE / 2);
            playerY = (HEIGHT / 2) - (PLAYER_SIZE / 2);
            
            // Генерация первой монеты (не на игроке)
            generateNewCoin();
            
            // Сброс очков и времени
            score = 0;
            timeLeft = 30;
            active = true;
            updateScoreUI();
            updateTimeUI();
            messageDiv.innerHTML = "🎮 Собирай монеты! 30 секунд 🎮";
            
            // Очищаем старый интервал, если вдруг остался
            if (timerInterval) clearInterval(timerInterval);
            
            // Запускаем таймер
            timerInterval = setInterval(() => {
                if (active && timeLeft > 0) {
                    timeLeft--;
                    updateTimeUI();
                    if (timeLeft <= 0) {
                        endGame();
                    }
                } else if (!active && timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }, 1000);
        }
        
        // ---------- Подключаем обработчики и стартуем ----------
        window.addEventListener('load', () => {
            initGame();          // первый запуск всех параметров
            // Слушатели клавиатуры
            window.addEventListener('keydown', handleKeyDown);
            window.addEventListener('keyup', handleKeyUp);
            
            // Кнопка перезапуска
            restartBtn.addEventListener('click', () => {
                resetGame();     // полный сброс и перезапуск
            });
            
            // Запускаем игровой цикл (анимация)
            gameLoop();
        });
        
        // Дополнительная очистка интервала при потенциальных утечках (необязательно, но корректно)
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
        });
        
    })();
</script>
</body>
</html>
